name: "CMake (x64 Linux)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
    build-and-test-x64-linux-cmake:
      name: Build and Test
      runs-on: ubuntu-latest
      env:
        cache-name: ${{github.job}}
        cache-path: "./build"
      steps:
        - uses: actions/checkout@v6
        - name: Setup Python
          uses: actions/setup-python@v6
        - name: Check Python
          run: python --version
        - name: Install system dependencies
          run: |
            apt-get update
            apt-get install -y cmake python3-dev python3-pip
        - name: Install dependendcies
          run: |
            python3 -m pip install --break-system-packages absl-py cython
        - name: Restore CMake cache
          uses: actions/cache/restore@v5
          id: cmake-cache-restore
          with:
            path: ${{env.cache-path}}
            key: cmake-cache-${{env.cache-name}}
            restore-keys: cmake-cache-${{env.cache-name}}-
        - name: Configure
          run: >-
            cmake -S . -B build
            -DOPENFST_ENABLE_BIN -DOPENFST_BUILD_TESTS=ON -DBUILD_SHARED_LIBS=ON
            -DOPENFST_ENABLE_FSTS -DOPENFST_ENABLE_GRM -DOPENFST_ENABLE_PYTHON
            -DOPENFST_ENABLE_CATEGORIAL
        - name: Build
          run: |
            cmake --build build -j$(nproc)
        - name: Test
          run: |
            ctest --test-dir build --output-on-failure -j$(nproc)
        - name: Save new cache for main
          if: github.ref == 'refs/heads/main'
          uses: actions/cache/save@v5
          with:
            path: ${{env.cache-path}}
            key: cmake-cache-${{env.cache-name}}-${{github.run_id}}
